services:
  postgres-source:
    image: postgres:16
    container_name: postgres-source
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sourcedb
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    ports:
      - "5432:5432"
    volumes:
      - ./source-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sourcedb"]
      interval: 5s
      timeout: 5s
      retries: 12

  postgres-target:
    image: postgres:16
    container_name: postgres-target
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: targetdb
    ports:
      - "5433:5432"          
    volumes:
      - ./target-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d targetdb"]
      interval: 5s
      timeout: 5s
      retries: 12

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"         
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
      - connect
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
    restart: unless-stopped

  connect:
    image: quay.io/debezium/connect:2.7
    container_name: connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: cdc-connect-cluster
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

  connector-init:
    image: curlimages/curl:8.10.1
    container_name: connector-init
    depends_on:
      - connect
    volumes:
      - ./debezium/connector-config.json:/config.json:ro
    entrypoint:
      - sh
      - -c
      - |
        echo "Waiting for Kafka Connect REST API...";
        until [ "$$(curl -s -o /dev/null -w '%{http_code}' http://connect:8083/connectors)" = "200" ]; do
          sleep 3;
        done;
        sleep 5;
        echo "Registering Debezium PostgreSQL connector...";
        code=$$(curl -s -o /tmp/r.json -w '%{http_code}' -X POST -H 'Content-Type: application/json' --data @/config.json http://connect:8083/connectors);
        echo "HTTP status: $$code (200/201 = created, 409 = already exists)";
        cat /tmp/r.json 2>/dev/null || true;
        echo;
        echo "connector-init finished.";
    restart: "no"

  fake-data:
    build: ./fake-data
    container_name: fake-data
    depends_on:
      postgres-source:
        condition: service_healthy
    environment:
      SOURCE_DB_HOST: postgres-source
      SOURCE_DB_PORT: "5432"
      SOURCE_DB_NAME: sourcedb
      SOURCE_DB_USER: postgres
      SOURCE_DB_PASSWORD: postgres
    restart: "no"

  consumer:
    build: ./consumer
    container_name: consumer
    depends_on:
      postgres-target:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      TOPIC_PREFIX: dbserver1
      TARGET_DB_HOST: postgres-target
      TARGET_DB_PORT: "5432"
      TARGET_DB_NAME: targetdb
      TARGET_DB_USER: postgres
      TARGET_DB_PASSWORD: postgres
    restart: unless-stopped

  airflow:
    build: ./airflow
    container_name: airflow
    depends_on:
      postgres-target:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "change-me-airflow-secret-key-0123456789"
      TARGET_DB_HOST: postgres-target
      TARGET_DB_PORT: "5432"
      TARGET_DB_NAME: targetdb
      TARGET_DB_USER: postgres
      TARGET_DB_PASSWORD: postgres
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./batch:/opt/airflow/batch:ro
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true;
        airflow scheduler &
        exec airflow webserver --port 8080
    restart: unless-stopped

  superset:
    image: apache/superset:3.1.0
    container_name: superset
    depends_on:
      - postgres-target
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "change-me-to-a-long-random-string-0123456789abcdef"
      TALISMAN_ENABLED: "false"
    restart: unless-stopped
