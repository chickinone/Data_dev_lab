services:
  postgres-source:
    image: postgres:16
    container_name: postgres-source
    environment:
      POSTGRES_USER: ${SOURCE_DB_USER}
      POSTGRES_PASSWORD: ${SOURCE_DB_PASSWORD}
      POSTGRES_DB: ${SOURCE_DB_NAME}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    ports:
      - "5432:5432"
    volumes:
      - postgres_source_data:/var/lib/postgresql/data
      - ./db/postgres_source/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  postgres-target:
    image: postgres:16
    container_name: postgres-target
    environment:
      POSTGRES_USER: ${TARGET_DB_USER}
      POSTGRES_PASSWORD: ${TARGET_DB_PASSWORD}
      POSTGRES_DB: ${TARGET_DB_NAME}
    ports:
      - "5433:5432"          
    volumes:
      - postgres_target_data:/var/lib/postgresql/data
      - ./db/postgres_target/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  mongodb:
    image: mongo:7
    container_name: mongodb
    entrypoint:
      - bash
      - -c
      - |
        printf '%s' "$${MONGO_REPLICA_SET_KEY}" > /data/mongodb-keyfile
        chmod 400 /data/mongodb-keyfile
        chown mongodb:mongodb /data/mongodb-keyfile
        exec docker-entrypoint.sh mongod --replSet "$${MONGO_REPLICA_SET}" --bind_ip_all --keyFile /data/mongodb-keyfile
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
      MONGO_REPLICA_SET: ${MONGO_REPLICA_SET}
      MONGO_REPLICA_SET_KEY: ${MONGO_REPLICA_SET_KEY}
    ports:
      - "27017:27017"
    volumes:
      - mongo_source_data:/data/db
      - mongo_source_config:/data/configdb
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 24

  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_REPLICA_SET: ${MONGO_REPLICA_SET}
    entrypoint:
      - bash
      - -c
      - |
        mongosh --host mongodb:27017 \
          -u "$${MONGO_ROOT_USERNAME}" \
          -p "$${MONGO_ROOT_PASSWORD}" \
          --authenticationDatabase admin \
          --eval "try { rs.status().ok } catch (e) { rs.initiate({_id: '$${MONGO_REPLICA_SET}', members: [{ _id: 0, host: 'mongodb:27017' }]}) }"
    restart: "no"

  mongodb-target:
    image: mongo:7
    container_name: mongodb-target
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_TARGET_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_TARGET_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_TARGET_DATABASE}
    ports:
      - "27018:27017"
    volumes:
      - mongo_target_data:/data/db
      - mongo_target_config:/data/configdb
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 24

  minio-source:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio-source
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_SOURCE_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_SOURCE_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_source_data:/data

  minio-target:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio-target
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_TARGET_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_TARGET_ROOT_PASSWORD}
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_target_data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: minio-init
    depends_on:
      minio-source:
        condition: service_started
      minio-target:
        condition: service_started
    environment:
      MINIO_SOURCE_ROOT_USER: ${MINIO_SOURCE_ROOT_USER}
      MINIO_SOURCE_ROOT_PASSWORD: ${MINIO_SOURCE_ROOT_PASSWORD}
      MINIO_TARGET_ROOT_USER: ${MINIO_TARGET_ROOT_USER}
      MINIO_TARGET_ROOT_PASSWORD: ${MINIO_TARGET_ROOT_PASSWORD}
      MINIO_SOURCE_BUCKETS: ${MINIO_SOURCE_BUCKETS}
      MINIO_TARGET_BUCKETS: ${MINIO_TARGET_BUCKETS}
    entrypoint:
      - sh
      - -c
      - |
        until mc alias set source http://minio-source:9000 "$${MINIO_SOURCE_ROOT_USER}" "$${MINIO_SOURCE_ROOT_PASSWORD}" && mc ready source; do
          echo "Waiting for minio-source...";
          sleep 3;
        done;
        until mc alias set target http://minio-target:9000 "$${MINIO_TARGET_ROOT_USER}" "$${MINIO_TARGET_ROOT_PASSWORD}" && mc ready target; do
          echo "Waiting for minio-target...";
          sleep 3;
        done;
        for bucket in $${MINIO_SOURCE_BUCKETS}; do
          mc mb --ignore-existing "source/$${bucket}";
        done;
        for bucket in $${MINIO_TARGET_BUCKETS}; do
          mc mb --ignore-existing "target/$${bucket}";
        done;
        echo "minio-init finished.";
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"         
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
      - connect
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
    restart: unless-stopped

  connect:
    image: quay.io/debezium/connect:2.7
    container_name: connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: cdc-connect-cluster
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

  connector-init:
    image: curlimages/curl:8.10.1
    container_name: connector-init
    depends_on:
      - connect
    environment:
      SOURCE_DB_HOST: ${SOURCE_DB_HOST}
      SOURCE_DB_PORT: ${SOURCE_DB_PORT}
      SOURCE_DB_NAME: ${SOURCE_DB_NAME}
      SOURCE_DB_USER: ${SOURCE_DB_USER}
      SOURCE_DB_PASSWORD: ${SOURCE_DB_PASSWORD}
      TOPIC_PREFIX: ${TOPIC_PREFIX}
      DEBEZIUM_CONNECTOR_NAME: ${DEBEZIUM_CONNECTOR_NAME}
      DEBEZIUM_SLOT_NAME: ${DEBEZIUM_SLOT_NAME}
      DEBEZIUM_PUBLICATION_NAME: ${DEBEZIUM_PUBLICATION_NAME}
    entrypoint:
      - sh
      - -c
      - |
        echo "Waiting for Kafka Connect REST API...";
        until [ "$$(curl -s -o /dev/null -w '%{http_code}' http://connect:8083/connectors)" = "200" ]; do
          sleep 3;
        done;
        sleep 5;
        cat > /tmp/config.json <<EOF
        {
          "name": "$${DEBEZIUM_CONNECTOR_NAME}",
          "config": {
            "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
            "tasks.max": "1",
            "database.hostname": "$${SOURCE_DB_HOST}",
            "database.port": "$${SOURCE_DB_PORT}",
            "database.user": "$${SOURCE_DB_USER}",
            "database.password": "$${SOURCE_DB_PASSWORD}",
            "database.dbname": "$${SOURCE_DB_NAME}",
            "topic.prefix": "$${TOPIC_PREFIX}",
            "plugin.name": "pgoutput",
            "slot.name": "$${DEBEZIUM_SLOT_NAME}",
            "publication.name": "$${DEBEZIUM_PUBLICATION_NAME}",
            "publication.autocreate.mode": "filtered",
            "table.include.list": "public.customers,public.orders",
            "snapshot.mode": "initial",
            "tombstones.on.delete": "false",
            "decimal.handling.mode": "string",
            "time.precision.mode": "connect",
            "key.converter": "org.apache.kafka.connect.json.JsonConverter",
            "key.converter.schemas.enable": "false",
            "value.converter": "org.apache.kafka.connect.json.JsonConverter",
            "value.converter.schemas.enable": "false"
          }
        }
        EOF
        echo "Registering Debezium PostgreSQL connector...";
        code=$$(curl -s -o /tmp/r.json -w '%{http_code}' -X POST -H 'Content-Type: application/json' --data @/tmp/config.json http://connect:8083/connectors);
        echo "HTTP status: $$code (200/201 = created, 409 = already exists)";
        cat /tmp/r.json 2>/dev/null || true;
        echo;
        echo "connector-init finished.";
    restart: "no"

  mongo-connector-init:
    image: curlimages/curl:8.10.1
    container_name: mongo-connector-init
    depends_on:
      connect:
        condition: service_started
      mongo-init:
        condition: service_completed_successfully
    environment:
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE}
      MONGO_REPLICA_SET: ${MONGO_REPLICA_SET}
      MONGO_TOPIC_PREFIX: ${MONGO_TOPIC_PREFIX}
      MONGO_DEBEZIUM_CONNECTOR_NAME: ${MONGO_DEBEZIUM_CONNECTOR_NAME}
    entrypoint:
      - sh
      - -c
      - |
        echo "Waiting for Kafka Connect REST API...";
        until [ "$$(curl -s -o /dev/null -w '%{http_code}' http://connect:8083/connectors)" = "200" ]; do
          sleep 3;
        done;
        sleep 5;
        cat > /tmp/mongo-config.json <<EOF
        {
          "name": "$${MONGO_DEBEZIUM_CONNECTOR_NAME}",
          "config": {
            "connector.class": "io.debezium.connector.mongodb.MongoDbConnector",
            "tasks.max": "1",
            "mongodb.connection.string": "mongodb://$${MONGO_ROOT_USERNAME}:$${MONGO_ROOT_PASSWORD}@$${MONGO_HOST}:$${MONGO_PORT}/?authSource=$${MONGO_AUTH_SOURCE}&replicaSet=$${MONGO_REPLICA_SET}",
            "topic.prefix": "$${MONGO_TOPIC_PREFIX}",
            "database.include.list": "$${MONGO_DATABASE}",
            "collection.include.list": "$${MONGO_DATABASE}.customer_profiles,$${MONGO_DATABASE}.product_reviews,$${MONGO_DATABASE}.click_events",
            "capture.mode": "change_streams_update_full",
            "snapshot.mode": "initial",
            "tombstones.on.delete": "false",
            "key.converter": "org.apache.kafka.connect.json.JsonConverter",
            "key.converter.schemas.enable": "false",
            "value.converter": "org.apache.kafka.connect.json.JsonConverter",
            "value.converter.schemas.enable": "false"
          }
        }
        EOF
        echo "Registering Debezium MongoDB connector...";
        code=$$(curl -s -o /tmp/mongo-r.json -w '%{http_code}' -X POST -H 'Content-Type: application/json' --data @/tmp/mongo-config.json http://connect:8083/connectors);
        echo "HTTP status: $$code (200/201 = created, 409 = already exists)";
        cat /tmp/mongo-r.json 2>/dev/null || true;
        echo;
        echo "mongo-connector-init finished.";
    restart: "no"

  fake-data:
    build: ./fake-data/fake_data_structured
    container_name: fake-data
    depends_on:
      postgres-source:
        condition: service_healthy
    environment:
      SOURCE_DB_HOST: ${SOURCE_DB_HOST}
      SOURCE_DB_PORT: ${SOURCE_DB_PORT}
      SOURCE_DB_NAME: ${SOURCE_DB_NAME}
      SOURCE_DB_USER: ${SOURCE_DB_USER}
      SOURCE_DB_PASSWORD: ${SOURCE_DB_PASSWORD}
      POISON_EVENTS: ${POISON_EVENTS}
      FAKE_DATA_DURATION_SECONDS: ${FAKE_DATA_DURATION_SECONDS}
      FAKE_DATA_SLEEP_MIN_SECONDS: ${FAKE_DATA_SLEEP_MIN_SECONDS}
      FAKE_DATA_SLEEP_MAX_SECONDS: ${FAKE_DATA_SLEEP_MAX_SECONDS}
    restart: "no"

  fake-mongo-data:
    build: ./fake-data/fake_data_nosql
    container_name: fake-mongo-data
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    environment:
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE}
      MONGO_REPLICA_SET: ${MONGO_REPLICA_SET}
      MONGO_FAKE_DURATION_SECONDS: ${MONGO_FAKE_DURATION_SECONDS}
      MONGO_FAKE_SLEEP_MIN_SECONDS: ${MONGO_FAKE_SLEEP_MIN_SECONDS}
      MONGO_FAKE_SLEEP_MAX_SECONDS: ${MONGO_FAKE_SLEEP_MAX_SECONDS}
    restart: "no"

  object-event-producer:
    build: ./producers/object_event_producer
    container_name: object-event-producer
    depends_on:
      kafka:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP}
      OBJECT_EVENTS_TOPIC: ${OBJECT_EVENTS_TOPIC}
      OBJECT_EVENT_SCAN_INTERVAL_SECONDS: ${OBJECT_EVENT_SCAN_INTERVAL_SECONDS}
      OBJECT_EVENT_RUN_ONCE: ${OBJECT_EVENT_RUN_ONCE}
      MINIO_SOURCE_ENDPOINT: ${MINIO_SOURCE_ENDPOINT}
      MINIO_SOURCE_ROOT_USER: ${MINIO_SOURCE_ROOT_USER}
      MINIO_SOURCE_ROOT_PASSWORD: ${MINIO_SOURCE_ROOT_PASSWORD}
      MINIO_SOURCE_BUCKETS: ${MINIO_SOURCE_BUCKETS}
    restart: unless-stopped

  object-sink-consumer:
    build: ./consumers/consumer_object
    container_name: object-sink-consumer
    depends_on:
      kafka:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      mongodb-target:
        condition: service_healthy
      object-event-producer:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP}
      OBJECT_EVENTS_TOPIC: ${OBJECT_EVENTS_TOPIC}
      OBJECT_DLQ_TOPIC: ${OBJECT_DLQ_TOPIC}
      OBJECT_SINK_GROUP_ID: ${OBJECT_SINK_GROUP_ID}
      MAX_RETRIES: ${MAX_RETRIES}
      MINIO_SOURCE_ENDPOINT: ${MINIO_SOURCE_ENDPOINT}
      MINIO_SOURCE_ROOT_USER: ${MINIO_SOURCE_ROOT_USER}
      MINIO_SOURCE_ROOT_PASSWORD: ${MINIO_SOURCE_ROOT_PASSWORD}
      MINIO_TARGET_ENDPOINT: ${MINIO_TARGET_ENDPOINT}
      MINIO_TARGET_ROOT_USER: ${MINIO_TARGET_ROOT_USER}
      MINIO_TARGET_ROOT_PASSWORD: ${MINIO_TARGET_ROOT_PASSWORD}
      MONGO_TARGET_HOST: ${MONGO_TARGET_HOST}
      MONGO_TARGET_PORT: ${MONGO_TARGET_PORT}
      MONGO_TARGET_DATABASE: ${MONGO_TARGET_DATABASE}
      MONGO_TARGET_ROOT_USERNAME: ${MONGO_TARGET_ROOT_USERNAME}
      MONGO_TARGET_ROOT_PASSWORD: ${MONGO_TARGET_ROOT_PASSWORD}
      MONGO_TARGET_AUTH_SOURCE: ${MONGO_TARGET_AUTH_SOURCE}
    restart: unless-stopped

  mongo-sink-consumer:
    build: ./consumers/consumer_mongo
    container_name: mongo-sink-consumer
    depends_on:
      kafka:
        condition: service_started
      mongodb-target:
        condition: service_healthy
      mongo-connector-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP}
      MONGO_TOPIC_PREFIX: ${MONGO_TOPIC_PREFIX}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_TARGET_HOST: ${MONGO_TARGET_HOST}
      MONGO_TARGET_PORT: ${MONGO_TARGET_PORT}
      MONGO_TARGET_DATABASE: ${MONGO_TARGET_DATABASE}
      MONGO_TARGET_ROOT_USERNAME: ${MONGO_TARGET_ROOT_USERNAME}
      MONGO_TARGET_ROOT_PASSWORD: ${MONGO_TARGET_ROOT_PASSWORD}
      MONGO_TARGET_AUTH_SOURCE: ${MONGO_TARGET_AUTH_SOURCE}
      MONGO_SINK_GROUP_ID: ${MONGO_SINK_GROUP_ID}
      MONGO_DLQ_TOPIC: ${MONGO_DLQ_TOPIC}
      MAX_RETRIES: ${MAX_RETRIES}
    restart: unless-stopped

  consumer:
    build: ./consumers/consumer_postgres
    container_name: consumer
    depends_on:
      postgres-target:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP}
      TOPIC_PREFIX: ${TOPIC_PREFIX}
      TARGET_DB_HOST: ${TARGET_DB_HOST}
      TARGET_DB_PORT: ${TARGET_DB_PORT}
      TARGET_DB_NAME: ${TARGET_DB_NAME}
      TARGET_DB_USER: ${TARGET_DB_USER}
      TARGET_DB_PASSWORD: ${TARGET_DB_PASSWORD}
      DLQ_TOPIC: ${DLQ_TOPIC}
      CDC_CONSUMER_GROUP: ${CDC_CONSUMER_GROUP}
      MAX_RETRIES: ${MAX_RETRIES}
    restart: unless-stopped

  airflow:
    build: ./airflow
    container_name: airflow
    depends_on:
      postgres-target:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW_DAGS_ARE_PAUSED_AT_CREATION}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      BATCH_JOB_NAME: ${BATCH_JOB_NAME}
      SPARK_MASTER: ${SPARK_MASTER}
      TARGET_DB_HOST: ${TARGET_DB_HOST}
      TARGET_DB_PORT: ${TARGET_DB_PORT}
      TARGET_DB_NAME: ${TARGET_DB_NAME}
      TARGET_DB_USER: ${TARGET_DB_USER}
      TARGET_DB_PASSWORD: ${TARGET_DB_PASSWORD}
      MONGO_BATCH_JOB_NAME: ${MONGO_BATCH_JOB_NAME}
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE}
      MONGO_REPLICA_SET: ${MONGO_REPLICA_SET}
      MONGO_TARGET_HOST: ${MONGO_TARGET_HOST}
      MONGO_TARGET_PORT: ${MONGO_TARGET_PORT}
      MONGO_TARGET_DATABASE: ${MONGO_TARGET_DATABASE}
      MONGO_TARGET_ROOT_USERNAME: ${MONGO_TARGET_ROOT_USERNAME}
      MONGO_TARGET_ROOT_PASSWORD: ${MONGO_TARGET_ROOT_PASSWORD}
      MONGO_TARGET_AUTH_SOURCE: ${MONGO_TARGET_AUTH_SOURCE}
      OBJECT_BATCH_JOB_NAME: ${OBJECT_BATCH_JOB_NAME}
      MINIO_TARGET_ENDPOINT: ${MINIO_TARGET_ENDPOINT}
      MINIO_TARGET_ROOT_USER: ${MINIO_TARGET_ROOT_USER}
      MINIO_TARGET_ROOT_PASSWORD: ${MINIO_TARGET_ROOT_PASSWORD}
      MINIO_TARGET_BUCKETS: ${MINIO_TARGET_BUCKETS}
    volumes:
      - airflow_home:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./batch:/opt/airflow/batch:ro
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --firstname "$${AIRFLOW_ADMIN_FIRSTNAME}" \
          --lastname "$${AIRFLOW_ADMIN_LASTNAME}" \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" || true;
        airflow scheduler &
        exec airflow webserver --port 8080
    restart: unless-stopped

  superset:
    image: apache/superset:3.1.0
    container_name: superset
    depends_on:
      - postgres-target
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      TALISMAN_ENABLED: ${SUPERSET_TALISMAN_ENABLED}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
